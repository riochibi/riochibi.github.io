<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gift | てのこや</title>
<meta name="description" content="大切な人への贈りものや、人生の節目を彩るオーダーメイド作品を制作しています。">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Josefin+Sans:wght@300;400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">

<body>

<div id="header-mount"></div>

<section class="sub-hero">
  <img src="images/gift/gift-01.jpg" alt="Gift">
  <div class="sub-hero-overlay">
    <p class="en">Gift</p>
    <p class="jp">想いを形にする贈りもの。</p>
  </div>
</section>

<section class="sub-intro fade-in">
  <div class="container">
    <p>
      大切な人への贈りものや、人生の節目を彩るオーダーメイド作品を制作しています。
      世界にひとつだけの「想いを形にする贈りもの」をお届けします。
    </p>
  </div>
</section>

<section class="fade-in">
  <div class="container">
    <div class="gift-cta">
      <h2 class="section-title-en">Order Made</h2>
      <p class="section-title-jp">オーダーメイドのご相談</p>
      <p class="section-lead" style="margin-left:auto;margin-right:auto;">
        オーダーメイドに関してのご相談は、下記のフォームからお問い合わせください。
      </p>
      <a href="https://www.instagram.com/tenokoya_rio" target="_blank" rel="noopener" class="btn btn-primary">Instagramからご相談</a>

  </div>
</section>

<div id="footer-mount"></div>

<script src="data/site-config.js"></script>
<script src="js/common.js"></script>
<script src="js/transition.js"></script>
